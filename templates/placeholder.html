{% extends "base.html" %}
{% set main_class = "placeholder-frame" %}

{% block title %}{{ page.title }} — sqrtl squad{% endblock %}

{% block content %}
<section class="placeholder-panel" aria-labelledby="placeholderTitle">
  <div class="placeholder-copy">
    <p class="placeholder-kicker">{{ page.kicker }}</p>
    <h1 id="placeholderTitle">{{ page.title }}</h1>
    <h2>sorry, we’re not ready yet.</h2>
    <p>{{ page.message }}</p>
    <div class="hero-buttons">
      <a class="primary-button" href="{{ url_for('home') }}">back home <span aria-hidden="true">→</span></a>
    </div>
  </div>

  <div class="placeholder-art" aria-hidden="true">
    <div class="water-portal placeholder-portal">
      <img class="placeholder-squirtle" src="{{ url_for('static', filename='img/sad-squirtle.png') }}" alt="">
    </div>
  </div>
</section>
{% endblock %}
