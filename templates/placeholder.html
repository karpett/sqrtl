<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sqrtl squad{% endblock %}</title>
  <meta name="description" content="sqrtl squad is a cozy private space to host, organize, and share with friends.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>
  <main class="app-frame placeholder-frame">
    <header class="topbar">
      <a href="{{ url_for('home') }}" class="brand" aria-label="sqrtl squad home">
        <img src="{{ url_for('static', filename='img/cool-squirtle-icon.png') }}" alt="">
        <span>
          <strong>squirtle</strong>
          <strong>squad</strong>
        </span>
      </a>

      <nav class="nav-pill" aria-label="Main navigation">
        <a class="{{ 'active' if active_page == 'home' else '' }}" href="{{ url_for('home') }}">home</a>
        <a class="{{ 'active' if active_page == 'gallery' else '' }}" href="{{ url_for('gallery') }}">gallery</a>
        <a class="{{ 'active' if active_page == 'collections' else '' }}" href="{{ url_for('collections') }}">collections</a>
        <a class="{{ 'active' if active_page == 'shared' else '' }}" href="{{ url_for('shared') }}">shared</a>
        <a class="{{ 'active' if active_page == 'about' else '' }}" href="{{ url_for('about') }}">about</a>
      </nav>

      <div class="top-actions">
        <button class="circle-button theme-toggle-button" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme"><img id="themeToggleIcon" src="{{ url_for('static', filename='img/theme-sun.png') }}" alt="" aria-hidden="true"></button>
        <button class="circle-button" id="searchToggle" type="button" aria-label="Open search" title="Search">⌕</button>
      </div>
    </header>

    <section class="placeholder-panel">
      <div class="placeholder-copy">
        <p class="placeholder-kicker">{{ page.kicker }}</p>
        <h1>{{ page.title }}</h1>
        <h2>sorry, we’re not ready yet.</h2>
        <p>{{ page.message }}</p>

        <div class="hero-buttons">
          <a class="primary-button" href="{{ url_for('home') }}">Back home <span>→</span></a>
        </div>
      </div>

      <div class="placeholder-art" aria-hidden="true">
        <div class="water-portal placeholder-portal">
          <img class="placeholder-squirtle" src="{{ url_for('static', filename='img/sad-squirtle.png') }}" alt="">
        </div>
      </div>
    </section>

    <footer class="wave-footer" aria-label="Footer">
      <img src="{{ url_for('static', filename='img/cool-squirtle-icon.png') }}" alt="sqrtl icon">
    </footer>
  </main>
  <div class="search-overlay" id="searchOverlay" aria-hidden="true">
    <div class="search-card" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
      <button class="search-close" id="searchClose" type="button" aria-label="Close search">×</button>
      <p>search sqrtl</p>
      <h2 id="searchTitle">search is coming soon.</h2>
      <input type="search" placeholder="try photos, tags, friends..." disabled>
      <small>when the gallery is ready, this will search photos, tags, collections, and shared items.</small>
    </div>
  </div>
</body>
</html>
